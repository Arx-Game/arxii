# Pinned project name so VS Code, the devcontainer CLI, and Docker Desktop
# all operate on the same stack (clean start/stop, no orphan projects).
name: arxii-devcontainer

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    # Required by init-firewall.sh (iptables/ipset).
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ..:/workspaces/arxii:cached
      # Shadow Windows-side artefacts with Linux-native named volumes.
      - arxii-venv:/workspaces/arxii/.venv
      - arxii-fe-node-modules:/workspaces/arxii/frontend/node_modules
      # Git worktrees live under .claude/worktrees. On the bind-mounted
      # workspace that path is D:\ (a Windows drive over the WSL2 9p mount),
      # where each worktree's ~245 MB uv venv is FULL-COPIED file-by-file
      # (cache is cross-filesystem, so uv can't hardlink) — ~10 min to
      # create/delete. A Linux-native volume here (paired with UV_CACHE_DIR
      # below, on the SAME volume) lets uv hardlink instead: create drops to
      # <1 s. fix-volume-perms.sh chowns this mountpoint. See #1037.
      - arxii-worktrees:/workspaces/arxii/.claude/worktrees
      # Persist Claude Code auth/config so login survives container rebuilds.
      - arxii-claude-home:/home/vscode/.claude
      # Persist polytoken's config (incl. model-provider credentials) and
      # session history across rebuilds, mirroring arxii-claude-home above.
      # Config dir confirmed at ~/.config/polytoken; sessions under
      # ~/.local/share/polytoken (XDG). Verify the session dir at first dc-build.
      - arxii-polytoken-config:/home/vscode/.config/polytoken
      - arxii-polytoken-data:/home/vscode/.local/share/polytoken
      # Shadow the host's src/.env (which points DATABASE_URL at a bare-metal
      # localhost Postgres) with a container-specific file. sync-env.sh
      # generates dev.env from src/.env with DATABASE_URL rewritten before
      # `just dc-up` brings the stack up.
      - ./dev.env:/workspaces/arxii/src/.env
    # ALSO load dev.env as process environment so non-Django tools (gh, curl,
    # etc.) can read variables like GH_TOKEN without sourcing the .env file
    # manually. The bind-mount above is what Django/django-environ reads; this
    # env_file is what the shell sees. Both point at the same dev.env so they
    # stay in lockstep.
    env_file:
      - ./dev.env
    environment:
      # django-environ env.db() reads DATABASE_URL; points at the db service.
      DATABASE_URL: postgres://arxii:arxii@db:5432/arxiidev
      # Pin the superpowers brainstorm-server port (server.cjs reads
      # BRAINSTORM_PORT, otherwise picks random in 49152-65535). Fixing it
      # to one port lets us forward exactly that one to the Windows host
      # instead of opening a 16k-port range.
      BRAINSTORM_PORT: "49200"
      # Relocate Claude Code's config directory inside the named-volume mount
      # so .claude.json (account/onboarding state) persists across
      # dc-down/dc-up. Default location is ~/.claude.json (a sibling of the
      # .claude/ directory and OUTSIDE the named volume), which gets reset
      # to image state on every container recreate — forcing re-login.
      # post-create.sh migrates an existing ~/.claude.json the first time
      # this env var takes effect. See #505 for full root-cause analysis.
      CLAUDE_CONFIG_DIR: /home/vscode/.claude
      # Put uv's cache on the SAME filesystem as worktree venvs (the
      # arxii-worktrees volume above) so `uv sync` in a fresh worktree
      # HARDLINKS from cache instead of full-copying ~245 MB of tiny files.
      # uv only hardlinks within one filesystem; cache-on-overlay vs
      # venv-on-9p was the root cause of ~10 min worktree create/delete.
      # Verify after a rebuild: a sampled worktree venv file shows links>1
      # (`stat -c %h .claude/worktrees/<wt>/.venv/bin/activate_this.py`). #1037
      UV_CACHE_DIR: /workspaces/arxii/.claude/worktrees/.uv-cache
      # Base image leaves TERM=xterm (tput colors reports 8), which fails
      # polytoken's stage-1 256-color capability check. A manual `export` or
      # ~/.bashrc edit doesn't persist across rebuilds (/home/vscode isn't a
      # named volume outside arxii-claude-home/arxii-polytoken-*), so set it
      # here instead. Applies container-wide (VS Code terminal, docker exec,
      # just recipes), not just interactive login shells.
      TERM: xterm-256color
      COLORTERM: truecolor
    # Forward the brainstorm-server port so http://localhost:49200/ in the
    # Windows browser reaches the in-container server. The skill's
    # start-server.sh defaults to binding 127.0.0.1; pass --host 0.0.0.0
    # --url-host localhost so it actually listens on the forwarded interface.
    #
    # Web ports for manual browser testing of the game from the Windows host:
    #   3000 — Vite dev server (frontend with hot reload); proxies /api → :4001
    #   4001 — Django/Evennia web server (REST API, admin, static assets)
    #   4002 — Evennia portal (game websocket — the browser connects directly)
    # All three are needed: the browser loads the page from :3000, makes API
    # calls through Vite's proxy to :4001, and opens a websocket to :4002.
    # Use `arx serve` (which serves the built frontend from Django) if you
    # only want to forward 4001+4002 and skip Vite.
    ports:
      - "49200:49200"
      - "3000:3000"
      - "4001:4001"
      - "4002:4002"
    command: sleep infinity
    # Cap container logs at 150 MB (50 MB × 3 rotated files). Docker's
    # default json-file driver has no rotation — a crash-looping process
    # can fill the WSL2 vhdx with GB/hour of logs before anyone notices.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    depends_on:
      - db

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: arxii
      POSTGRES_PASSWORD: arxii
      POSTGRES_DB: arxiidev
    volumes:
      # Named volume = optional local-dev persistence. Wiping it is safe
      # (DB is test-only); Django's test runner builds test_arxiidev anyway.
      - arxii-pgdata:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  arxii-pgdata:
  arxii-venv:
  arxii-fe-node-modules:
  arxii-worktrees:
  arxii-claude-home:
  arxii-polytoken-config:
  arxii-polytoken-data:
