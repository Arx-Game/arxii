# Repo-wide Dependabot: every dependency ecosystem is monitored so no known
# vulnerability sits unpatched. This file governs *version* updates (and how
# they're grouped/scheduled). Dependabot *security* PRs (driven by the GitHub
# Advisory DB) are enabled separately at the repo level (Settings -> Code
# security -> "Dependabot security updates"); they open as needed regardless
# of the weekly schedule below and also respect these groups.
#
# Grouping convention: minor+patch bumps are batched into ONE PR per
# ecosystem per week (low review noise for a small team); MAJOR bumps come as
# individual PRs so breaking changes get reviewed on their own.
version: 2
updates:
  # GitHub Actions — every action is pinned to a full commit SHA; the
  # trailing `# vX.Y.Z` lets Dependabot bump BOTH the SHA and the comment so
  # the pins don't silently rot and miss upstream security patches.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
    open-pull-requests-limit: 5

  # Python backend — uv (reads pyproject.toml + uv.lock, incl. transitives).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    groups:
      python-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 10

  # JS/TS — the pnpm frontend (prod-facing). The mcp/* packages are
  # internal dev-only tooling, never deployed or exposed as MCP servers in
  # prod, so they are intentionally out of scope here.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    groups:
      js-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 10
