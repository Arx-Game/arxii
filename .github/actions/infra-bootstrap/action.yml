name: 'Infra bootstrap'
description: >-
  Shared setup steps for the infra buttons (standup.yml, rehearse.yml; #2236
  review — previously byte-identical steps duplicated in both workflows).
  Installs OpenTofu + Python + ansible-core + the project's Galaxy
  collections, then writes the admin SSH private key to a 0600 file. The
  calling workflow MUST run actions/checkout BEFORE this action — a local
  composite action (referenced by path, `./.github/actions/...`) only
  exists on disk once the repo is checked out, and this action's own
  "Install Ansible + collections" step reads infra/ansible/requirements.yml
  from the checkout.

inputs:
  ssh_private_key:
    description: >-
      Admin SSH private key (secret). Written to ~/.ssh/arxii_admin, 0600,
      never logged (the calling workflow's step already runs with `set +x`
      via this action's own step, and the value is a masked GitHub secret
      wherever it flows).
    required: true

runs:
  using: composite
  steps:
    - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
      with: { tofu_wrapper: false }

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with: { python-version: "3.13" }

    - name: Install Ansible + collections
      shell: bash
      run: |
        set -euo pipefail
        # Pin major.minor; bump deliberately (not a floating latest).
        pip install --quiet "ansible-core==2.18.*"
        ansible-galaxy collection install -r infra/ansible/requirements.yml

    - name: SSH key (0600, never logged)
      shell: bash
      run: |
        set -euo pipefail; set +x
        install -d -m 0700 ~/.ssh
        # umask subshell: the file is 0600 from creation (no default-perms
        # window between write and chmod).
        ( umask 077; printf '%s' "$SSH_PRIVATE_KEY" > ~/.ssh/arxii_admin )
      env:
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
