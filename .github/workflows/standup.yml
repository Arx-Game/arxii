name: Stand up infra (the button)

# ONE-CLICK button: Actions -> "Stand up infra" -> Run workflow. The job
# targets the gated `prod` Environment, so GitHub PAUSES for a required-
# reviewer approval before anything runs. It is a THIN wrapper: injects the
# gated Environment secrets and invokes the SAME infra/scripts/standup.sh
# (DRY). APPLY-ONLY — no destroy, no restore (restore is a separate gated
# tool). Secrets are env-only, masked, never echoed, never --extra-vars.
#
# SUPPLY CHAIN (critical here — this job sees the gated prod secrets): every
# action is pinned to a full commit SHA, never a mutable tag. Trailing
# `# vX.Y.Z` is the Dependabot-readable version; only the SHA is trusted.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print steps, change nothing)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: arxii-standup
  cancel-in-progress: false

jobs:
  standup:
    runs-on: ubuntu-latest
    environment: prod        # gated: required-reviewer approval before run
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with: { tofu_wrapper: false }
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with: { python-version: "3.13" }
      - name: Install Ansible + collections
        run: |
          set -euo pipefail
          pip install --quiet ansible
          ansible-galaxy collection install -r infra/ansible/requirements.yml

      - name: SSH key (from gated Environment; 0600, never logged)
        run: |
          set -euo pipefail; set +x
          install -d -m 0700 ~/.ssh
          # umask subshell: the file is 0600 from creation (no default-perms
          # window between write and chmod).
          ( umask 077; printf '%s' "$ANSIBLE_SSH_PRIVATE_KEY" > ~/.ssh/arxii_admin )
        env:
          ANSIBLE_SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}

      - name: Run the button (same script as local; apply-only)
        run: |
          set -euo pipefail; set +x
          export ANSIBLE_PRIVATE_KEY_FILE=~/.ssh/arxii_admin
          export ANSIBLE_HOST_KEY_CHECKING=False
          args=()
          [ "${DRY_RUN}" = "true" ] && args+=(--dry-run)
          bash infra/scripts/standup.sh "${args[@]}"
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          # Provisioning (operator/CI-only; revoke at provider after run):
          LINODE_TOKEN: ${{ secrets.TF_LINODE_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          TF_STATE_BOOTSTRAPPED: "1"
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
          TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
          TF_STATE_ENDPOINT: ${{ vars.TF_STATE_ENDPOINT }}
          TF_STATE_S3_ACCESS_KEY: ${{ secrets.TF_STATE_S3_ACCESS_KEY }}
          TF_STATE_S3_SECRET_KEY: ${{ secrets.TF_STATE_S3_SECRET_KEY }}
          # Non-secret tofu inputs as Variables, not Secrets:
          TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_domain: ${{ vars.ARXII_DOMAIN }}
          TF_VAR_authorized_keys: ${{ vars.ARXII_AUTHORIZED_KEYS }}
          TF_VAR_state_bucket_label: ${{ vars.ARXII_BACKUPS_BUCKET }}
          TF_VAR_r2_bucket_name: ${{ vars.ARXII_R2_BUCKET }}
          TF_VAR_dmarc_rua: ${{ vars.ARXII_DMARC_RUA }}
          # Runtime app secrets (ansible step -> 0600 EnvironmentFile only):
          ARXII_PG_PASSWORD: ${{ secrets.ARXII_PG_PASSWORD }}
          ARXII_DJANGO_SECRET_KEY: ${{ secrets.ARXII_DJANGO_SECRET_KEY }}
          ARXII_CLOUDINARY_URL: ${{ secrets.ARXII_CLOUDINARY_URL }}
          ARXII_RESEND_API_KEY: ${{ secrets.ARXII_RESEND_API_KEY }}
          ARXII_R2_ACCESS_KEY_ID: ${{ secrets.ARXII_R2_ACCESS_KEY_ID }}
          ARXII_R2_SECRET_ACCESS_KEY: ${{ secrets.ARXII_R2_SECRET_ACCESS_KEY }}
          ARXII_OFFBOX_ALERT_TOKEN: ${{ secrets.ARXII_OFFBOX_ALERT_TOKEN }}
          ARXII_CADDY_CF_DNS_TOKEN: ${{ secrets.ARXII_CADDY_CF_DNS_TOKEN }}
          # First-run Django superuser: password is a Secret (long-lived,
          # rotate on suspicion); username + email are Variables (non-secret
          # operator choices). Username/email default to arxii_admin /
          # admin@example.invalid if the Variables are unset.
          ARXII_DJANGO_SUPERUSER_PASSWORD: ${{ secrets.ARXII_DJANGO_SUPERUSER_PASSWORD }}
          ARXII_DJANGO_SUPERUSER_USERNAME: ${{ vars.ARXII_DJANGO_SUPERUSER_USERNAME }}
          ARXII_DJANGO_SUPERUSER_EMAIL: ${{ vars.ARXII_DJANGO_SUPERUSER_EMAIL }}
