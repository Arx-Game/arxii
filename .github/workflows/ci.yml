name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: '3.13'
      - run: uv sync
      - run: uv run pre-commit install
      - run: uv run pre-commit run --all-files

  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          # Shard groupings by approximate test-method count (as of 2026-05-02).
          # Run `grep -rc "def test_" src/<app>/tests/ | awk -F: '{s+=$2} END {print s}'`
          # per app to refresh counts after adding significant test suites.
          #
          # shard-1 (~1,215): world.magic (887) + world.combat (328)
          - name: shard-1
            apps: "world.magic world.combat"
          # shard-2 (~1,405): world.stories (759) + world.mechanics (258)
          #                   + world.conditions (190) + world.items (198)
          - name: shard-2
            apps: "world.stories world.mechanics world.conditions world.items"
          # shard-3 (~1,378): flows (259) + world.progression (255) + world.scenes (227)
          #                   + world.character_sheets (202) + world.character_creation (200)
          #                   + world.gm (120) + actions (115)
          - name: shard-3
            apps: "flows world.progression world.scenes world.character_sheets world.character_creation world.gm actions"
          # shard-4 (~1,422): all remaining apps — roster, societies, game_clock, fatigue,
          #                   events, skills, relationships, distinctions, codex, goals, checks,
          #                   web, integration_tests, core_management, action_points, narrative,
          #                   journals, achievements, forms, commands, covenants, tarot, vitals,
          #                   player_submissions, classes, staff_inbox, typeclasses, consent,
          #                   behaviors
          - name: shard-4
            apps: >-
              world.roster world.societies world.game_clock world.fatigue world.events
              world.skills world.relationships world.distinctions world.codex world.goals
              world.checks world.action_points world.narrative world.journals world.achievements
              world.forms world.covenants world.tarot world.vitals world.player_submissions
              world.classes world.staff_inbox world.consent
              web web.admin web.api
              integration_tests.pipeline integration_tests.game_content
              core_management commands typeclasses behaviors
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arxii_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DEBUG: False
      SECRET_KEY: test-secret-key-for-ci-only
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arxii_test
      CLOUDINARY_CLOUD_NAME: test-cloud
      CLOUDINARY_API_KEY: test-key
      CLOUDINARY_API_SECRET: test-secret
      SENDGRID_API_KEY: test-sendgrid-key
      DEFAULT_FROM_EMAIL: test@example.com
      FACEBOOK_APP_ID: test-facebook-id
      FACEBOOK_APP_SECRET: test-facebook-secret
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: '3.13'
      - run: uv sync
      - name: Run migrations
        run: uv run arx manage migrate
      - name: Run tests
        run: uv run arx test --parallel auto ${{ matrix.shard.apps }}

  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v2
        with:
          python-version: '3.13'
      - run: uv sync
      - run: uv run ty check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
