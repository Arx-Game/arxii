name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'
      - run: uv sync
      - run: uv run pre-commit install
      - run: uv run pre-commit run --all-files

  # Sharded test execution. Each shard runs a slice of apps in parallel.
  # The `backend` job below aggregates shard results so existing branch
  # protection rules requiring a check named "backend" continue to work.
  backend-shard:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          # Shard groupings by approximate test-method count (as of 2026-05-02).
          # Run `grep -rc "def test_" src/<app>/tests/ | awk -F: '{s+=$2} END {print s}'`
          # per app to refresh counts after adding significant test suites.
          #
          # shard-1 (~1,461): world.magic (887) + world.combat (328) + world.missions (246)
          - name: shard-1
            apps: "world.magic world.combat world.missions"
          # shard-2 (~1,465): world.stories (759) + world.mechanics (258)
          #                   + world.conditions (190) + world.items (198)
          #                   + world.areas (39) + world.instances (21)
          - name: shard-2
            apps: "world.stories world.mechanics world.conditions world.items world.areas world.instances"
          # shard-3 (~1,604): flows (259) + world.progression (255) + world.scenes (227)
          #                   + world.character_sheets (202) + world.character_creation (200)
          #                   + world.gm (120) + actions (115) + world.locations (187)
          #                   + world.traits (39)
          - name: shard-3
            apps: "flows world.progression world.scenes world.character_sheets world.character_creation world.gm actions world.locations world.traits"
          # shard-4 (~1,447): all remaining apps — roster, societies, game_clock, fatigue,
          #                   events, skills, relationships, distinctions, codex, goals, checks,
          #                   web, integration_tests, core_management, action_points, narrative,
          #                   journals, achievements, forms, commands, covenants, tarot, vitals,
          #                   player_submissions, classes, staff_inbox, typeclasses, consent,
          #                   behaviors, evennia_extensions (25), realms (0), species (0)
          - name: shard-4
            apps: >-
              world.roster world.societies world.game_clock world.fatigue world.events
              world.skills world.relationships world.distinctions world.codex world.goals
              world.checks world.action_points world.narrative world.journals world.achievements
              world.forms world.covenants world.tarot world.vitals world.player_submissions
              world.classes world.staff_inbox world.consent
              web web.admin web.api
              integration_tests.pipeline integration_tests.game_content
              core_management commands typeclasses behaviors
              evennia_extensions world.realms world.species world.projects world.npc_services world.predicates world.buildings world.room_features
    # NOTE: We use a manual `docker run` rather than the GitHub Actions `services:`
    # block because the `services:` block has no way to pass a positional COMMAND to
    # the Postgres container. We need to bump `max_locks_per_transaction` past the
    # default 64 to support Django's per-test `flush` (which TRUNCATEs every table
    # in a single transaction; the cumulative table+FK-constraint count exceeds 64
    # in parallel-worker tests). 512 is a generous headroom.
    env:
      DEBUG: False
      SECRET_KEY: test-secret-key-for-ci-only
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arxii_test
      CLOUDINARY_CLOUD_NAME: test-cloud
      CLOUDINARY_API_KEY: test-key
      CLOUDINARY_API_SECRET: test-secret
      SENDGRID_API_KEY: test-sendgrid-key
      DEFAULT_FROM_EMAIL: test@example.com
      FACEBOOK_APP_ID: test-facebook-id
      FACEBOOK_APP_SECRET: test-facebook-secret
    steps:
      - uses: actions/checkout@v6
      - name: Start Postgres with max_locks_per_transaction bumped
        run: |
          docker run -d \
            --name postgres-ci \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=arxii_test \
            -e POSTGRES_INITDB_ARGS=--no-sync \
            --tmpfs /var/lib/postgresql/data:rw,noexec,nosuid,size=2g \
            -p 5432:5432 \
            postgres:15 \
            -c max_locks_per_transaction=512
      - name: Wait for Postgres ready
        run: |
          for i in $(seq 1 30); do
            if docker exec postgres-ci pg_isready -U postgres -d arxii_test; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready" >&2
          docker logs postgres-ci
          exit 1
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'
      - run: uv sync
      - name: Run migrations
        run: uv run arx manage migrate
      - name: Run tests
        # Bare --parallel (no value) lets Django auto-detect CPU count.
        # Don't pass `auto` literally — arx.py declares --parallel as a typer
        # boolean flag, so `auto` would fall through as a positional test label
        # and Django would fail trying to import a module named `auto`.
        run: uv run arx test --parallel ${{ matrix.shard.apps }}

  # Aggregator: succeeds iff every backend-shard matrix entry succeeded.
  # Lets branch protection require a single status check named "backend"
  # instead of having to enumerate each shard.
  backend:
    needs: backend-shard
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate shard results
        run: |
          if [[ "${{ needs.backend-shard.result }}" != "success" ]]; then
            echo "One or more backend shards failed (status: ${{ needs.backend-shard.result }})"
            exit 1
          fi
          echo "All backend shards passed."

  ty:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'
      - run: uv sync
      - run: uv run ty check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  # #756: generated-API-types drift gate. Regenerates src/schema.json +
  # frontend/src/generated/api.d.ts exactly the way `just gen-api-types`
  # does (spectacular → openapi-typescript → prettier) and fails when the
  # committed files differ — so the generated types can't silently rot
  # against the backend schema. No database needed: spectacular against a
  # fresh, unmigrated SQLite produces a byte-identical schema (verified),
  # so the job skips Postgres/migrate entirely.
  api-types-drift:
    runs-on: ubuntu-latest
    env:
      DEBUG: False
      SECRET_KEY: test-secret-key-for-ci-only
      DATABASE_URL: sqlite:////tmp/drift.db
      CLOUDINARY_CLOUD_NAME: test-cloud
      CLOUDINARY_API_KEY: test-key
      CLOUDINARY_API_SECRET: test-secret
      SENDGRID_API_KEY: test-sendgrid-key
      DEFAULT_FROM_EMAIL: test@example.com
      FACEBOOK_APP_ID: test-facebook-id
      FACEBOOK_APP_SECRET: test-facebook-secret
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'
      - run: uv sync
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Regenerate API schema + types
        run: |
          uv run arx manage spectacular --file schema.json --validate
          pnpm --prefix frontend generate:types
          pnpm --prefix frontend exec prettier --write src/generated/api.d.ts
      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- src/schema.json frontend/src/generated/api.d.ts; then
            echo "::error::Generated API types are stale. Run 'just gen-api-types' and commit src/schema.json + frontend/src/generated/api.d.ts."
            exit 1
          fi
          echo "Generated API types are current."
