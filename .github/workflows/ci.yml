name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Merge queue: GitHub builds speculative branches (this PR on top of main and
  # any earlier-queued PRs) and merges in order once the required checks pass on
  # them. Without this trigger the required checks never run on the queue's
  # branch and queued PRs hang pending forever. The workflow used for a
  # merge_group event is taken from `main`, so this trigger must be on main
  # BEFORE the queue is enabled in branch protection (see #991).
  merge_group:

permissions:
  contents: read

# Cancel superseded PR runs. Without this, pushing a new commit to a PR leaves
# the now-obsolete run burning ~13 runner slots to completion — real contention
# on the org's concurrent-job cap (measured 2026-07-17: during a 3-build
# merge-queue burst, shards queued up to 9.5 min waiting for runners).
# Non-PR events (merge_group, push:main) get a unique group per run, so queue
# builds and main validation are never canceled or serialized.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detect which stacks the PR actually touches. Downstream heavy jobs are
  # gated on these flags so a backend-only change skips the frontend suite
  # (and vice-versa). The REQUIRED checks (`backend`, `frontend`) are the
  # always-running aggregators below — they report success when their heavy
  # job was skipped, so a gated-out stack never leaves a check pending.
  # ci.yml is in BOTH filters: touching CI re-runs everything.
  #
  # Path-skipping applies to PULL REQUESTS ONLY. On merge_group (the queue) and
  # push:main the full suite always runs — the integrated state must be fully
  # validated, never partially skipped. So the dorny step runs only on PRs; on
  # other events the filter outputs are empty and the heavy jobs fall through to
  # their `|| github.event_name != 'pull_request'` clause instead. Gating dorny
  # this way also guarantees the `changes` job itself SUCCEEDS on merge_group
  # (dorny has no defined behavior there) — a failed `changes` job would fail
  # the required aggregators and brick the queue.
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      # Third-party action SHA-pinned (SonarCloud supply-chain rule on new code).
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            backend:
              - 'src/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'tools/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'
      - run: uv sync
      - run: uv run pre-commit install
      - run: uv run pre-commit run --all-files

  # Sharded test execution. Each shard runs a slice of apps in parallel.
  # The `backend` job below aggregates shard results so existing branch
  # protection rules requiring a check named "backend" continue to work.
  backend-shard:
    needs: changes
    # On PRs, gate on changed paths; on merge_group/push:main always run.
    if: needs.changes.outputs.backend == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          # Eight shards balanced by MEASURED RUNTIME, not test count
          # (rebalanced from 6 shards 2026-07-17; corrected same day from the
          # first 8-shard run's measured "Run tests" step seconds — run
          # 29547709130). Test count was the old metric and it lied:
          # seconds-per-test varies up to ~2x between apps (actions and
          # world.combat run far slower per test than the small apps).
          # Each shard targets ~344s of test runtime (+~60s fixed setup).
          # To refresh: pull per-shard "Run tests" step seconds from a green
          # run, scale each app's estimate by its shard's actual/estimated
          # factor, and re-balance greedily (one such iteration converges
          # well; per-app comments below carry the current estimates).
          #
          # world.magic and world.combat are each bigger than a shard's
          # budget, so they are split below the app level: two shards each
          # run one generated half of the app's test modules
          # (split_app/split_part/split_of — see the "Run tests" step and
          # tools/split_test_labels.py). The split is re-derived from disk
          # every run, so new test modules cannot fall between the halves.
          #
          # tools/lint_shard_coverage.py (the shard-coverage pre-commit hook,
          # run by the pre-commit CI job) fails when an app is missing from
          # this matrix, covered twice, or listed as a sub-app label — keep
          # it green when editing.
          #
          # shard-1 (~344s): world.magic half 1 (~208s) + world.societies (55)
          #   + world.npc_services (30) + world.character_sheets (19)
          #   + world.distinctions (11) + world.skills (8) + evennia_extensions (6)
          #   + typeclasses (5) + world.instances (2). world.realms (0 tests) is inert.
          - name: shard-1
            split_app: world.magic
            split_part: 1
            split_of: 2
            apps: >-
              world.societies world.npc_services world.character_sheets
              world.distinctions world.skills evennia_extensions typeclasses
              world.instances world.realms
          # shard-2 (~344s): world.magic half 2 (~208s) + integration_tests (51)
          #   + world.mechanics (33) + world.room_features (17) + world.travel (12)
          #   + world.classes (8) + world.weather (6) + world.projects (5)
          #   + world.boundaries (3)
          - name: shard-2
            split_app: world.magic
            split_part: 2
            split_of: 2
            apps: >-
              integration_tests world.mechanics world.room_features world.travel
              world.classes world.weather world.projects world.boundaries
          # shard-3 (~343s): world.combat half 1 (~178s) + world.items (68)
          #   + world.checks (35) + world.gm (24) + world.seeds (15)
          #   + world.fatigue (10) + world.assets (7) + world.action_points (5)
          #   + core (3)
          - name: shard-3
            split_app: world.combat
            split_part: 1
            split_of: 2
            apps: >-
              world.items world.checks world.gm world.seeds world.fatigue
              world.assets world.action_points core
          # shard-4 (~344s): world.combat half 2 (~178s) + world.covenants (65)
          #   + world.conditions (37) + world.locations (24) + world.justice (15)
          #   + world.game_clock (9) + world.narrative (7) + world.consent (6)
          #   + world.predicates (2)
          - name: shard-4
            split_app: world.combat
            split_part: 2
            split_of: 2
            apps: >-
              world.covenants world.conditions world.locations world.justice
              world.game_clock world.narrative world.consent world.predicates
          # shard-5 (~344s): actions (199) + world.progression (56) + world.forms (35)
          #   + world.events (21) + world.currency (11) + world.clues (7)
          #   + world.species (6) + world.captivity (6) + world.military (2)
          - name: shard-5
            apps: >-
              actions world.progression world.forms world.events world.currency
              world.clues world.species world.captivity world.military
          # shard-6 (~344s): world.stories (118) + world.battles (106)
          #   + world.character_creation (38) + web (30) + world.codex (17)
          #   + world.companions (14) + world.ships (7) + world.achievements (6)
          #   + world.dreams (3) + world.tidings (3) + behaviors (1)
          - name: shard-6
            apps: >-
              world.stories world.battles world.character_creation web world.codex
              world.companions world.ships world.achievements world.dreams
              world.tidings behaviors
          # shard-7 (~344s): world.scenes (150) + world.areas (78) + flows (37)
          #   + world.buildings (30) + world.vitals (17) + core_management (10)
          #   + world.player_submissions (8) + world.staff_inbox (7)
          #   + world.estates (4) + world.traits (3)
          - name: shard-7
            apps: >-
              world.scenes world.areas flows world.buildings world.vitals
              core_management world.player_submissions world.staff_inbox
              world.estates world.traits
          # shard-8 (~344s): commands (150) + world.missions (70)
          #   + world.relationships (50) + world.roster (24) + world.secrets (17)
          #   + world.goals (11) + world.agriculture (8) + world.journals (6)
          #   + world.tarot (5) + world.ceremonies (2) + world.worship (1)
          - name: shard-8
            apps: >-
              commands world.missions world.relationships world.roster world.secrets
              world.goals world.agriculture world.journals world.tarot
              world.ceremonies world.worship
    # NOTE: We use a manual `docker run` rather than the GitHub Actions `services:`
    # block because the `services:` block has no way to pass a positional COMMAND to
    # the Postgres container. We need to bump `max_locks_per_transaction` past the
    # default 64 to support Django's per-test `flush` (which TRUNCATEs every table
    # in a single transaction; the cumulative table+FK-constraint count exceeds 64
    # in parallel-worker tests). 512 is a generous headroom.
    env:
      DEBUG: False
      SECRET_KEY: test-secret-key-for-ci-only
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/arxii_test
      CLOUDINARY_CLOUD_NAME: test-cloud
      CLOUDINARY_API_KEY: test-key
      CLOUDINARY_API_SECRET: test-secret
      SENDGRID_API_KEY: test-sendgrid-key
      DEFAULT_FROM_EMAIL: test@example.com
      FACEBOOK_APP_ID: test-facebook-id
      FACEBOOK_APP_SECRET: test-facebook-secret
    steps:
      - uses: actions/checkout@v6
      - name: Start Postgres with max_locks_per_transaction bumped
        run: |
          docker run -d \
            --name postgres-ci \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=arxii_test \
            -e POSTGRES_INITDB_ARGS=--no-sync \
            --tmpfs /var/lib/postgresql/data:rw,noexec,nosuid,size=2g \
            -p 5432:5432 \
            postgres:15 \
            -c max_locks_per_transaction=512
      - name: Wait for Postgres ready
        run: |
          for i in $(seq 1 30); do
            if docker exec postgres-ci pg_isready -U postgres -d arxii_test; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready" >&2
          docker logs postgres-ci
          exit 1
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'
      - run: uv sync
      # Build the default DB's schema straight from model state — no migration
      # replay (12.5-14 min of Python-side state rendering; see ADR
      # ci-schema-from-models). Also satisfies #990: Evennia's test runner
      # queries server_serverconfig on the DEFAULT connection, so the default
      # DB must have tables before `arx test` runs. Migration-chain validity
      # is gated by the makemigrations --check step (ty job) and the nightly
      # migration-replay workflow, not per-shard.
      - name: Build schema from model state
        run: uv run python tools/build_schema.py
      # Build the test DB by CLONING the just-built default DB rather than
      # letting each parallel worker build its own schema from scratch.
      # Postgres `CREATE DATABASE ... TEMPLATE` is a near-instant file copy;
      # `arx test --keepdb` then reuses test_arxii_test (its schema is already
      # fully populated) and only clones it per parallel worker. The test DB
      # name is Django's default `test_<NAME>` for DATABASES["default"]
      # (NAME=arxii_test, no TEST override). We connect to the `postgres`
      # maintenance DB so nothing is attached to the arxii_test template
      # during the copy.
      - name: Clone built DB into the test database
        run: |
          docker exec postgres-ci psql -U postgres -d postgres \
            -c "CREATE DATABASE test_arxii_test TEMPLATE arxii_test"
      - name: Run tests
        # Bare --parallel (no value) lets Django auto-detect CPU count.
        # Don't pass `auto` literally — arx.py declares --parallel as a typer
        # boolean flag, so `auto` would fall through as a positional test label
        # and Django would fail trying to import a module named `auto`.
        # --keepdb: reuse the pre-cloned test_arxii_test instead of rebuilding it.
        #
        # Shards with a split_app additionally run one generated slice of that
        # app's test modules. split_test_labels.py re-derives the module set
        # from disk and exits non-zero sooner than emit an incomplete slice;
        # `test -n` backstops an empty expansion so a script failure can never
        # quietly shrink the label list.
        run: |
          LABELS="${{ matrix.shard.apps }}"
          if [ -n "${{ matrix.shard.split_app }}" ]; then
            PART_LABELS="$(uv run python tools/split_test_labels.py ${{ matrix.shard.split_app }} \
              --part ${{ matrix.shard.split_part }} --of ${{ matrix.shard.split_of }})"
            test -n "$PART_LABELS"
            LABELS="$LABELS $PART_LABELS"
          fi
          uv run arx test --keepdb --parallel $LABELS

  # Aggregator: succeeds iff every backend-shard matrix entry succeeded.
  # Lets branch protection require a single status check named "backend"
  # instead of having to enumerate each shard.
  backend:
    needs: [changes, backend-shard]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate shard results
        run: |
          # Guard: if change-detection itself broke, don't silently pass.
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job did not succeed (status: ${{ needs.changes.result }})"
            exit 1
          fi
          # No backend changes -> shard skipped -> this required check passes.
          if [[ "${{ needs.backend-shard.result }}" == "skipped" ]]; then
            echo "No backend changes — backend tests not required. Passing."
            exit 0
          fi
          if [[ "${{ needs.backend-shard.result }}" != "success" ]]; then
            echo "One or more backend shards failed (status: ${{ needs.backend-shard.result }})"
            exit 1
          fi
          echo "All backend shards passed."

  ty:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # A reachable Postgres is required even for this static-analysis job:
    # Django's migration loader imports every migration module on disk to
    # build its dependency graph, and one Evennia-library migration
    # (objects/0007_objectdb_db_account.py) opens a real DB cursor at module
    # import time to probe for a legacy table. Trust auth, no schema needed —
    # the probed table simply won't exist.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: unused
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.13'
      - run: uv sync
      - run: uv run ty check
      # Drift gate: fails when a local app's models have changed without a
      # matching migration. Scoped to first-party apps so the phantom
      # Evennia-library proxy-model changes that core_management's custom
      # makemigrations filters only at write time can't trip this gate.
      - name: Check migrations match models
        env:
          DEBUG: False
          SECRET_KEY: test-secret-key-for-ci-only
          DATABASE_URL: postgresql://postgres@localhost:5432/unused
          CLOUDINARY_CLOUD_NAME: test-cloud
          CLOUDINARY_API_KEY: test-key
          CLOUDINARY_API_SECRET: test-secret
          SENDGRID_API_KEY: test-sendgrid-key
          DEFAULT_FROM_EMAIL: test@example.com
          FACEBOOK_APP_ID: test-facebook-id
          FACEBOOK_APP_SECRET: test-facebook-secret
        run: uv run python tools/check_missing_migrations.py

  frontend-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  # Aggregator mirroring `backend`: the REQUIRED check named "frontend" always
  # runs and reports success when `frontend-test` was skipped (no frontend
  # changes), so a backend-only PR never leaves this check pending.
  frontend:
    needs: [changes, frontend-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate frontend result
        run: |
          # Guard: if change-detection itself broke, don't silently pass.
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job did not succeed (status: ${{ needs.changes.result }})"
            exit 1
          fi
          # No frontend changes -> frontend-test skipped -> this check passes.
          if [[ "${{ needs.frontend-test.result }}" == "skipped" ]]; then
            echo "No frontend changes — frontend tests not required. Passing."
            exit 0
          fi
          if [[ "${{ needs.frontend-test.result }}" != "success" ]]; then
            echo "Frontend job failed (status: ${{ needs.frontend-test.result }})"
            exit 1
          fi
          echo "Frontend passed."

  # #756: generated-API-types drift gate. Regenerates src/schema.json +
  # frontend/src/generated/api.d.ts exactly the way `just gen-api-types`
  # does (spectacular → openapi-typescript → prettier) and fails when the
  # committed files differ — so the generated types can't silently rot
  # against the backend schema. The schema is DB-backend-sensitive
  # (SQLite's 64-bit integer ranges produce int64 formats PG doesn't, and
  # one path param needs a built table), so this regenerates against a
  # schema-from-models Postgres — trust-auth service container, no password exists.
  api-types-drift:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: arxii_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DEBUG: False
      SECRET_KEY: test-secret-key-for-ci-only
      DATABASE_URL: postgresql://postgres@localhost:5432/arxii_test
      CLOUDINARY_CLOUD_NAME: test-cloud
      CLOUDINARY_API_KEY: test-key
      CLOUDINARY_API_SECRET: test-secret
      SENDGRID_API_KEY: test-sendgrid-key
      DEFAULT_FROM_EMAIL: test@example.com
      FACEBOOK_APP_ID: test-facebook-id
      FACEBOOK_APP_SECRET: test-facebook-secret
    steps:
      - uses: actions/checkout@v6
      # Third-party actions SHA-pinned (SonarCloud supply-chain rule on new code).
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: '3.13'
      - run: uv sync
      # Build the default DB's schema straight from model state — no migration
      # replay (12.5-14 min of Python-side state rendering; see ADR
      # ci-schema-from-models). Migration-chain validity is gated by the
      # makemigrations --check step (ty job) and the nightly migration-replay
      # workflow, not here.
      - name: Build schema from model state
        run: uv run python tools/build_schema.py
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Regenerate API schema + types
        run: |
          uv run arx manage spectacular --file schema.json --validate
          pnpm --prefix frontend generate:types
          pnpm --prefix frontend exec prettier --write src/generated/api.d.ts
      - name: Fail on drift
        run: |
          if ! git diff --quiet -- src/schema.json frontend/src/generated/api.d.ts; then
            STAT=$(git diff --stat -- src/schema.json frontend/src/generated/api.d.ts | tr '\n' ' ')
            HEAD_DIFF=$(git diff -U0 -- src/schema.json frontend/src/generated/api.d.ts | head -c 600 | tr '\n' ' ')
            echo "::error::Generated API types are stale (run 'just gen-api-types' and commit). Drift: ${STAT} | First hunks: ${HEAD_DIFF}"
            git diff --stat -- src/schema.json frontend/src/generated/api.d.ts
            git diff -- src/schema.json frontend/src/generated/api.d.ts | head -100
            exit 1
          fi
          echo "Generated API types are current."
