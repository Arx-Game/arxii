---
- name: Install nftables
  ansible.builtin.apt:
    name: nftables
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Render nftables ruleset (syntax-checked before applying)
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    owner: root
    group: root
    mode: "0750"
    validate: "/usr/sbin/nft -c -f %s"
  notify: Reload nftables

- name: Enable nftables at boot
  ansible.builtin.systemd_service:
    name: nftables
    enabled: true
    state: started
