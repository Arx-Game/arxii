---
# Path to the deployed Evennia GAME_DIR. Evennia's SSL-telnet reads
# HARDCODED <game_dir>/server/ssl.cert and ssl.key (NOT settings-driven —
# verified against evennia source). GAME_DIR is the src/ dir nested inside
# app_current (see roles/app_deploy/defaults/main.yml app_gamedir:
# /opt/arxii/current/src — "server/conf/settings.py is at
# app_gamedir/server/conf/settings.py"), NOT app_current itself.
ttc_game_dir: /opt/arxii/current/src
ttc_web_fqdn: "play.example"           # the ACME cert domain
# Caddy's on-disk cert store (default). Confirm the acme dir segment.
#
# #2236 Phase 3 P1 (dress rehearsal): this role runs UNCHANGED in rehearsal
# (caddy_rehearsal_mode only swaps the Caddyfile template + skips the DNS-01
# plugin install — see roles/caddy). certmagic (Caddy's cert-storage layer)
# always lays certs out as `certificates/<issuer-key>/<domain>/<domain>.crt`
# — for ACME that segment is the CA directory hostname (e.g.
# `acme-v02.api.letsencrypt.org-directory`); for `local_certs` (Caddy's
# internal CA, used by Caddyfile.rehearsal.j2) it is the fixed segment
# `local`. The `*` wildcard below already spans that whole segment
# regardless of which issuer wrote it, so THIS GLOB WORKS UNCHANGED for a
# rehearsal-issued cert — verified by reading certmagic's storage-key
# convention (`storageKeyCertsPrefix`/`normalizedName` -> `<issuer>/<name>/`
# is the same shape for every issuer type); NOT verified by actually running
# Caddy locally with local_certs (this sandbox has no outbound network to
# fetch a caddy binary to test against — confirm on the first real rehearsal
# run; if the segment name ever turns out different, adjust this var, not
# the wildcard away).
ttc_caddy_cert_glob: "/var/lib/caddy/.local/share/caddy/certificates/*/{{ ttc_web_fqdn }}/{{ ttc_web_fqdn }}.crt"
ttc_caddy_key_glob: "/var/lib/caddy/.local/share/caddy/certificates/*/{{ ttc_web_fqdn }}/{{ ttc_web_fqdn }}.key"
ttc_reboot_window: "04:30"             # align with the unattended-upgrades window
ttc_service_user: arxii
ttc_service_group: arxii
