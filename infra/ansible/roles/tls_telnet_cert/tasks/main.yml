---
- name: Install the cert-sync script
  ansible.builtin.template:
    src: sync-telnet-cert.sh.j2
    dest: /usr/local/sbin/arxii-sync-telnet-cert
    owner: root
    group: root
    mode: "0750"

- name: Install the cert-sync systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/arxii-telnet-cert.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Sync Caddy ACME cert into Evennia SSL-telnet (reboot only if changed)
      [Service]
      Type=oneshot
      # No --require-cert: this unit's own daily timer has Persistent=true,
      # so it fires immediately on a fresh stand-up, racing Caddy's first
      # ACME issuance — a --require-cert flag here used to make THAT race a
      # guaranteed spurious failed unit on every first converge, with no
      # timer/watch to ever clear it. The script's soft "no Caddy cert yet"
      # exit-0 (see its own header comment) is correct for every caller,
      # timer included. The real detector for "cert never synced" is
      # offbox_alerting's heartbeat, which watches this unit's
      # systemctl is-failed state AND independently checks Caddy's
      # cert for self-signed-issuer (a synced cert would never be
      # self-signed) — see roles/offbox_alerting.
      ExecStart=/usr/local/sbin/arxii-sync-telnet-cert
  notify: Reload systemd

- name: Install the cert-sync timer (runs in the maintenance window)
  ansible.builtin.copy:
    dest: /etc/systemd/system/arxii-telnet-cert.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Daily Evennia SSL-telnet cert sync ({{ ttc_reboot_window }})
      [Timer]
      OnCalendar=*-*-* {{ ttc_reboot_window }}:00
      Persistent=true
      [Install]
      WantedBy=timers.target
  notify: Reload systemd

- name: Enable the cert-sync timer
  ansible.builtin.systemd_service:
    name: arxii-telnet-cert.timer
    enabled: true
    state: started
    daemon_reload: true
