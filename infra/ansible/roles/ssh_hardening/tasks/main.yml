---
# Lockout guard — the base role must have already created arxadmin + its
# key before we disable root login below, or this box becomes unreachable.
- name: Check arxadmin authorized_keys exists (lockout guard)
  ansible.builtin.stat:
    path: /home/arxadmin/.ssh/authorized_keys
  register: ssh_hardening_arxadmin_keys

- name: Fail-closed — refuse to disable root login without arxadmin keys in place
  ansible.builtin.assert:
    that:
      - ssh_hardening_arxadmin_keys.stat.exists and
        (ssh_hardening_arxadmin_keys.stat.size | default(0)) > 0
    fail_msg: >-
      /home/arxadmin/.ssh/authorized_keys is missing/empty — applying this
      drop-in (PermitRootLogin no) now would lock everyone out. LOCKOUT
      WARNING: ensure the base role ran first and admin_authorized_keys
      was non-empty.
    quiet: true

- name: Deploy hardened sshd drop-in (validated to avoid lockout)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-arxii-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/sshd -t -f %s"
    content: |
      # Managed by Ansible (ssh_hardening). Key-only, no root, modern crypto.
      Port {{ ssh_port }}
      PermitRootLogin no
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PubkeyAuthentication yes
      PermitEmptyPasswords no
      X11Forwarding no
      MaxAuthTries 3
      LoginGraceTime 20
      AllowTcpForwarding no
      AllowUsers {{ ssh_allow_users | join(' ') }}
      KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,sntrup761x25519-sha512@openssh.com
      Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
      MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
  notify: Restart sshd
