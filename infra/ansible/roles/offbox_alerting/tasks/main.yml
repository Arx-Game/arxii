---
- name: Install curl + openssl (heartbeat + cert check)
  ansible.builtin.apt:
    name: [curl, openssl]
    state: present
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: 600

- name: Install heartbeat script
  ansible.builtin.template:
    src: arxii-heartbeat.sh.j2
    dest: /usr/local/sbin/arxii-heartbeat
    owner: root
    group: root
    mode: "0750"

- name: Install heartbeat service (token from the EnvironmentFile)
  ansible.builtin.copy:
    dest: /etc/systemd/system/arxii-heartbeat.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Arx II off-box heartbeat + cert-expiry early warning
      [Service]
      Type=oneshot
      EnvironmentFile={{ secrets_env_file | default('/etc/arxii/arxii.env') }}
      ExecStart=/usr/local/sbin/arxii-heartbeat
  notify: Reload systemd

- name: Install heartbeat timer
  ansible.builtin.copy:
    dest: /etc/systemd/system/arxii-heartbeat.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Arx II heartbeat ({{ offbox_ping_interval }})
      [Timer]
      OnCalendar={{ offbox_ping_interval }}
      Persistent=true
      [Install]
      WantedBy=timers.target
  notify: Reload systemd

- name: Enable heartbeat timer
  ansible.builtin.systemd_service:
    name: arxii-heartbeat.timer
    enabled: true
    state: started
    daemon_reload: true

# --- Generic OnFailure= alert unit ------------------------------------------
# Owned here (not by roles/backups or roles/offsite_replication) because
# this role already owns the off-box-alert endpoint/token convention
# (OFFBOX_ALERT_TOKEN + the base-ping-URL + "/fail" idiom used by the
# heartbeat above); backups/offsite just reference this template unit by
# name via their own OnFailure=arxii-alert-failure@%n.service, keeping the
# alerting mechanism in one place instead of duplicated per consumer.
- name: Install the generic OnFailure= alert script
  ansible.builtin.template:
    src: arxii-alert-failure.sh.j2
    dest: /usr/local/sbin/arxii-alert-failure
    owner: root
    group: root
    mode: "0750"

- name: Install the OnFailure= alert template unit (instantiated as arxii-alert-failure@<unit>)
  ansible.builtin.copy:
    dest: /etc/systemd/system/arxii-alert-failure@.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Arx II off-box failure alert for %i
      [Service]
      Type=oneshot
      EnvironmentFile={{ secrets_env_file | default('/etc/arxii/arxii.env') }}
      ExecStart=/usr/local/sbin/arxii-alert-failure %i
  notify: Reload systemd
