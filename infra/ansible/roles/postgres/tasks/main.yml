---
- name: Install PostgreSQL + psycopg2 (for the postgresql_* modules)
  ansible.builtin.apt:
    name:
      - "postgresql-{{ postgres_version }}"
      - python3-psycopg2
    state: present
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: 600

- name: Harden postgresql.conf (localhost-only bind, scram)
  ansible.builtin.template:
    src: 10-arxii.conf.j2
    dest: "{{ postgres_conf_dir }}/conf.d/10-arxii.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart postgresql

- name: Lock down pg_hba.conf (no trust; local/loopback scram only)
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "{{ postgres_conf_dir }}/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Reload postgresql

- name: Apply conf/hba before creating the DB
  ansible.builtin.meta: flush_handlers

- name: Ensure the application database exists (create-if-absent, NEVER drop)
  community.postgresql.postgresql_db:
    name: "{{ postgres_db_name }}"
    state: present
  become: true
  become_user: postgres

# Two-step fail-closed (mirrors secrets_vault's pattern): no_log on the
# fact-gathering step (its RHS touches the actual secret value via
# lookup('env', ...)), then assert on the resulting BOOLEAN without no_log —
# a no_log assert also suppresses its own fail_msg ("output has been
# hidden"), which used to leave operators with no idea WHY it failed.
- name: Determine whether ARXII_PG_PASSWORD is non-empty (value never logged)
  ansible.builtin.set_fact:
    postgres_pg_password_present: "{{ (lookup('env', 'ARXII_PG_PASSWORD') | length > 0) }}"
  no_log: true

- name: Fail-closed — ARXII_PG_PASSWORD must be non-empty
  ansible.builtin.assert:
    that:
      - postgres_pg_password_present
    fail_msg: >-
      Refuses to set an empty DB password. Running this role outside
      standup.sh requires exporting ARXII_PG_PASSWORD.
    quiet: true

- name: Ensure the application role exists with the env-sourced password
  community.postgresql.postgresql_user:
    db: "{{ postgres_db_name }}"
    name: "{{ postgres_db_user }}"
    password: "{{ lookup('env', 'ARXII_PG_PASSWORD') }}"
    state: present
  become: true
  become_user: postgres
  no_log: true

- name: Grant the role privileges on its database (idempotent)
  community.postgresql.postgresql_privs:
    db: "{{ postgres_db_name }}"
    role: "{{ postgres_db_user }}"
    type: database
    privs: ALL
    state: present
  become: true
  become_user: postgres
