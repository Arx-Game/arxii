---
backups_db: arxii
backups_db_user: arxii
backups_staging: /var/backups/arxii          # latest dump kept here briefly
backups_bucket: "arxii-backups-REPLACE"      # = tofu output backups_bucket
backups_region: us-east
backups_s3_endpoint: "https://us-east.linodeobjects.com"
backups_window: "03:30"                      # before the patch/reboot window
# Creds (BACKUP_WRITER_ACCESS_KEY/SECRET) come from the env-injected
# EnvironmentFile — never in repo. Pruning is meant to be the bucket's
# server-side Object-Lock/lifecycle, NOT this client — but Object Lock is a
# KNOWN GAP (#2236, pinned Linode provider exposes no such argument; see
# infra/README.md "Known gap: Object Lock"). Until that lands, the writer
# key's bucket-scoping (cannot reach any other bucket/account) is the actual
# backstop against a stolen writer key.
