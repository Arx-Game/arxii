---
- name: Install unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable periodic security updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

- name: Configure unattended-upgrades (security pocket + windowed reboot)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/52arxii-unattended
    owner: root
    group: root
    mode: "0644"
    content: |
      // Managed by Ansible. Security pocket only; auto-reboot in the
      // documented low-traffic maintenance window (players dropped then).
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-WithUsers "true";
      Unattended-Upgrade::Automatic-Reboot-Time "{{ unattended_reboot_time }}";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
