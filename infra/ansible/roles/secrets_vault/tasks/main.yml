---
# #2236 Phase 3 P1 (dress rehearsal). vault_allow_empty is a fail-closed
# ESCAPE HATCH (see its own comment in defaults/main.yml) — refuse it outright
# unless rehearsal_mode is also true, so a stray/copy-pasted vault_allow_empty
# can never silently weaken prod's fail-closed posture on its own; BOTH vars
# must agree.
- name: Refuse vault_allow_empty outside rehearsal_mode
  ansible.builtin.assert:
    that:
      - (vault_allow_empty | length == 0) or rehearsal_mode
    fail_msg: >-
      vault_allow_empty is set ({{ vault_allow_empty | join(', ') }}) but
      rehearsal_mode is not true — this combination is refused. prod must
      never set vault_allow_empty; it exists only for rehearse.sh's
      generated rehearsal group_vars.
    quiet: true

# Two-step fail-closed: collect MISSING NAMES ONLY under no_log (values never
# touch the log), then assert without no_log so the failure message actually
# names which var(s) are missing instead of "result was suppressed".
# vault_allow_empty-listed names are skipped — ONLY reachable when
# rehearsal_mode is true (asserted above).
#
# secrets_map_optional (e.g. ARXII_SENTRY_DSN) is intentionally NEVER looped
# here — those entries are optional in prod itself, not just rehearsal; the
# template renders them directly via lookup('env', ...), empty or not, with
# no presence assertion. See secrets_map_optional's own comment in
# defaults/main.yml.
- name: Collect names of missing required secret env vars (values never logged)
  ansible.builtin.set_fact:
    secrets_vault_missing_env: >-
      {{ secrets_vault_missing_env | default([]) +
         ([item] if (item not in vault_allow_empty and
                      (lookup('env', item) | length == 0)) else []) }}
  loop: "{{ secrets_map.keys() | list }}"
  no_log: true

- name: Fail-closed — every required secret env var must be present & non-empty
  ansible.builtin.assert:
    that:
      - (secrets_vault_missing_env | default([])) | length == 0
    fail_msg: >-
      Required secret env var(s) missing/empty: {{
      secrets_vault_missing_env | default([]) | join(', ') }} (set from the
      gated GitHub Environment / password manager).
    quiet: true

- name: Defense-in-depth — operator/CI-only tokens must NOT be in this env
  ansible.builtin.assert:
    that:
      - "lookup('env', item) | length == 0"
    fail_msg: "'{{ item }}' is operator/CI-only and must never reach the box — do not export it to the ansible step."
    quiet: true
  loop: "{{ secrets_forbidden_env }}"
  no_log: true

- name: Ensure secrets dir exists
  ansible.builtin.file:
    path: "{{ secrets_env_dir }}"
    state: directory
    owner: "{{ secrets_owner }}"
    group: "{{ secrets_group }}"
    mode: "0750"

- name: Render the 0600 service-user EnvironmentFile (no_log — never printed)
  ansible.builtin.template:
    src: arxii.env.j2
    dest: "{{ secrets_env_file }}"
    owner: "{{ secrets_owner }}"
    group: "{{ secrets_group }}"
    mode: "0600"
  no_log: true
  notify: Reload systemd
