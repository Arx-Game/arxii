# SonarQube Cloud "Automatic Analysis" reads ITS configuration from this file
# (.sonarcloud.properties) — and IGNORES sonar-project.properties entirely.
# It is also read ONLY from the default branch (main); config added on a feature
# branch does NOT affect that branch's/PR's analysis. So this file must live on
# main to take effect. See the conversation that introduced it, and:
#   https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis

sonar.projectKey=Arx-Game_arxii
sonar.organization=arx-game

# Source directories
sonar.sources=src,frontend/src

# Exclusions — generated, compiled, and infrastructure files
sonar.exclusions=\
  **/migrations/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  **/dist/**,\
  src/web/static/**,\
  src/server/.static/**,\
  frontend/src/generated/**,\
  tools/**

# Test file identification
sonar.tests=src,frontend/src
sonar.test.inclusions=\
  **/tests/**,\
  **/tests.py,\
  **/test_*.py,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Suppress ALL issues on test code — we do not gate quality on test files, and
# fixing Sonar findings in them causes churn. "Test File Exclusions" applies to
# files already classified as tests (via sonar.test.inclusions above), so these
# globs mirror the inclusions plus factories.
sonar.test.exclusions=\
  **/tests/**,\
  **/tests.py,\
  **/test_*.py,\
  **/factories.py,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Duplication (CPD) exclusions — test code quality is not a gated concern.
sonar.cpd.exclusions=\
  **/tests/**,\
  **/tests.py,\
  **/test_*.py,\
  **/factories.py,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Python — set to 3.13 so type annotations are parsed correctly
sonar.python.version=3.13

# TypeScript
sonar.javascript.file.suffixes=.ts,.tsx

sonar.sourceEncoding=UTF-8

# Rule-scoped ignores for confirmed architectural false positives.
# NOTE: whether Automatic Analysis honors sonar.issue.ignore.multicriteria from
# this file is unverified — carried here to test it. If issues still surface for
# these rules after this lands on main, move them to the SonarCloud UI
# (Administration > Analysis Scope > "Ignore Issues on Multiple Criteria").
sonar.issue.ignore.multicriteria=drf_validators,custom_makemigrations
#   python:S3516 ("method always returns the same value") fires on idiomatic DRF
#   validators/updaters that return their input (validate -> attrs, validate_x -> x,
#   update -> instance). Scoped to serializer modules only.
sonar.issue.ignore.multicriteria.drf_validators.ruleKey=python:S3516
sonar.issue.ignore.multicriteria.drf_validators.resourceKey=**/*serializers.py
#   pythonenterprise:S8443 wants direct inheritance from BaseCommand; our command
#   intentionally extends Django's own makemigrations Command (which IS a BaseCommand)
#   to suppress phantom Evennia migrations.
sonar.issue.ignore.multicriteria.custom_makemigrations.ruleKey=pythonenterprise:S8443
sonar.issue.ignore.multicriteria.custom_makemigrations.resourceKey=**/management/commands/makemigrations.py
